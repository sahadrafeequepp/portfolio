    <script>
   
// Function to wrap letters in spans and set up the animation
function setupDancingText(elementId) {
    const element = document.getElementById(elementId);
    if (!element) return;

    const text = element.textContent;
    element.textContent = '';

    // Wrap each letter in a span
    text.split('').forEach((letter) => {
        const span = document.createElement('span');
        span.textContent = letter === ' ' ? '\u00A0' : letter;
        element.appendChild(span);
    });

    const letters = element.querySelectorAll('span');

    // Function to trigger the animation
    return function startDancing() {
        letters.forEach((span, index) => {
            setTimeout(() => {
                span.classList.add('dancing');
                setTimeout(() => {
                    span.classList.remove('dancing');
                }, 600);
            }, index * 100);
        });
    };
}

// Initialize both headings
const danceWelcome = setupDancingText('hero-name');
const danceMyWorld = setupDancingText('zero-name');

// Run the dance every 2 seconds
setInterval(() => {
    danceWelcome();
    danceMyWorld();
}, 2000);

// Initial trigger
danceWelcome();
danceMyWorld();
    </script>
